<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Signal</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
    <div class="page">
        <header class="header">
            <h1>Cyber Signal</h1>
            <p>Structured cyber event intelligence dashboard.</p>
        </header>

        <div class="grid">
            <aside class="panel">
                <div class="sidebar-section">
                    <h2>Filters</h2>

                    <div class="filter-grid">
                        <div>
                            <label for="filter-industry">Industry</label><br>
                            <select id="filter-industry" class="filter-select">
                                <option value="">All</option>
                            </select>
                        </div>

                        <div>
                            <label for="filter-region">Region</label><br>
                            <select id="filter-region" class="filter-select">
                                <option value="">All</option>
                            </select>
                        </div>

                        <div>
                            <label for="filter-country">Country</label><br>
                            <select id="filter-country" class="filter-select">
                                <option value="">All</option>
                            </select>
                        </div>

                        <div>
                            <label for="filter-attack-type">Attack Type</label><br>
                            <select id="filter-attack-type" class="filter-select">
                                <option value="">All</option>
                            </select>
                        </div>

                        <div>
                            <label for="filter-time-range">Time Range</label><br>
                            <select id="filter-time-range" class="filter-select">
                                <option value="">All Time</option>
                                <option value="24h">Past 24 Hours</option>
                                <option value="7d">Past 7 Days</option>
                                <option value="30d">Past 30 Days</option>
                                <option value="90d">Past 90 Days</option>
                                <option value="1y">Past 1 Year</option>
                            </select>
                        </div>
                    </div>

                    <div class="filter-actions">
                        <button id="reset-filters" type="button" class="filter-reset-button">
                            Reset Filters
                        </button>
                    </div>
                </div>
            </aside>

            <main class="content-stack">
                <section class="summary-grid">
                    <div class="summary-card">
                        <span class="label">Total Events</span>
                        <span class="value" id="total-events">--</span>
                    </div>
                    <div class="summary-card">
                        <span class="label">Validated Events</span>
                        <span class="value" id="validated-events">--</span>
                    </div>
                    <div class="summary-card">
                        <span class="label">Historical Events</span>
                        <span class="value" id="historical-events">--</span>
                    </div>
                    <div class="summary-card">
                        <span class="label">High Impact Events</span>
                        <span class="value" id="high-impact-events">--</span>
                    </div>

                    <div class="summary-card">
                        <span class="label">Top Industry</span>
                        <span class="value" id="top-industry">--</span>
                    </div>
                    <div class="summary-card">
                        <span class="label">Top Attack Type</span>
                        <span class="value" id="top-attack-type">--</span>
                    </div>
                    <div class="summary-card">
                        <span class="label">Top Region</span>
                        <span class="value" id="top-region">--</span>
                    </div>
                    <div class="summary-card">
                        <span class="label">Top Verification</span>
                        <span class="value" id="top-verification-level">--</span>
                    </div>
                </section>

                <section class="panel map-placeholder">
                    <div class="panel-header">
                        <h2>Map</h2>
                        <div class="map-legend">
                            <span class="legend-item">
                                <span class="legend-dot legend-dot-high"></span>
                                High
                            </span>
                            <span class="legend-item">
                                <span class="legend-dot legend-dot-medium"></span>
                                Medium
                            </span>
                            <span class="legend-item">
                                <span class="legend-dot legend-dot-low"></span>
                                Low
                            </span>
                        </div>
                    </div>
                    <div id="map"></div>
                </section>

                <section class="panel feed-placeholder">
                    <h2>Event Feed</h2>
                    <div id="event-feed" class="feed-list"></div>
                </section>
            </main>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
