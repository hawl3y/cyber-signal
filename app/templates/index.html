<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Signal</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="manifest" href="/static/site.webmanifest">
</head>
<body>
    <header class="app-header">
        <div class="app-header-inner">
            <img src="{{ url_for('static', filename='images/white-cyber-signal-logo.png') }}"
                 alt="Cyber Signal" class="app-logo">
        </div>
    </header>

    <div class="sticky-context-bar" id="sticky-context-bar" aria-hidden="true">
        <div class="sticky-context-inner">
            <span class="sticky-context-view" id="sticky-context-view">Incidents · 7d</span>
            <span class="sticky-context-count" id="sticky-context-count"></span>
        </div>
    </div>

    <div class="page">
        <main class="layout">
            <section class="panel filters-panel">
                <div class="panel-header-simple">
                    <span class="filter-context-label" id="filter-context-label">Incidents · 7d</span>
                    <div class="filter-actions">
                        <button id="toggle-filters" type="button" class="filter-reset-button">
                            Show Filters
                        </button>
                        <button id="reset-filters" type="button" class="filter-reset-button">
                            Reset
                        </button>
                    </div>
                </div>

                <div id="filter-chips" class="filter-chips"></div>

                <div id="filters-content" class="filter-row">
                    <div class="filter-item">
                        <label for="filter-time-range">Time Range</label>
                        <select id="filter-time-range" class="filter-select">
                            <option value="24h">24h</option>
                            <option value="7d" selected>7d</option>
                            <option value="30d">30d</option>
                            <option value="90d">90d</option>
                            <option value="">All time</option>
                        </select>
                    </div>

                    <div class="filter-item">
                        <label for="filter-region">Region</label>
                        <select id="filter-region" class="filter-select">
                            <option value="">All</option>
                        </select>
                    </div>

                    <div class="filter-item">
                        <label for="filter-industry">Sector</label>
                        <select id="filter-industry" class="filter-select">
                            <option value="">All</option>
                        </select>
                    </div>

                    <div class="filter-item">
                        <label for="filter-attack-type">Threat Type</label>
                        <select id="filter-attack-type" class="filter-select">
                            <option value="">All</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="summary-strip">
                <button type="button" class="summary-card" data-card-filter="total"
                        title="All events matching the current filters. Click to clear facet filters and any active card filter."
                        aria-label="Show all events">
                    <span class="label">Total Events</span>
                    <span class="value" id="total-events">--</span>
                </button>
                <button type="button" class="summary-card" data-card-filter="high_trust"
                        title="Trust score 75 or higher — multi-source corroboration, primary disclosure, or tier-1 trusted source. Click to filter the feed."
                        aria-label="Filter to high trust events">
                    <span class="label">High Trust</span>
                    <span class="value" id="high-trust-events">--</span>
                </button>
                <button type="button" class="summary-card" data-card-filter="high_impact"
                        title="Events flagged as high impact — large victim, critical-infrastructure target, or wide blast radius. Click to filter the feed."
                        aria-label="Filter to high impact events">
                    <span class="label">High Impact</span>
                    <span class="value" id="high-impact-events">--</span>
                </button>
                <button type="button" class="summary-card" data-card-filter="new"
                        title="Events first seen in the last 24 hours. Click to filter the feed."
                        aria-label="Filter to events from the last 24 hours">
                    <span class="label">New (24h)</span>
                    <span class="value" id="new-today-events">--</span>
                </button>
            </section>

            <section class="panel feed-panel">
                <div class="feed-header">
                    <h2 id="feed-view-label">Events</h2>
                    <span id="feed-count" class="feed-count"></span>
                </div>
                <div id="event-feed" class="feed-list"></div>
                <div class="load-more-container">
                    <button id="load-more-btn" type="button" class="load-more-btn" style="display:none">
                        Load More
                    </button>
                </div>
            </section>

            <section class="panel trends-panel" id="trends-panel">
                <div class="panel-header-simple trends-header" id="trends-header" role="button" aria-expanded="false" tabindex="0">
                    <div class="trends-header-text">
                        <h2>Trend Snapshot</h2>
                        <span class="panel-subtitle">Direction-driven signals</span>
                    </div>
                    <span class="trends-toggle-icon" aria-hidden="true"></span>
                </div>

                <div class="trends-grid" id="trends-grid">
                    <div class="trend-block">
                        <h3>Rising <span class="trend-window">(7d Δ)</span></h3>
                        <div id="trend-rising" class="trend-list"></div>
                    </div>

                    <div class="trend-block">
                        <h3>Active Actors <span class="trend-window">(7d)</span></h3>
                        <div id="trend-active-actors" class="trend-list"></div>
                    </div>

                    <div class="trend-block">
                        <h3>Coverage <span class="trend-window">(current view)</span></h3>
                        <div id="trend-sources" class="trend-list"></div>
                    </div>
                </div>
            </section>
        </main>
        <footer class="page-footer">
            <span class="footer-left">Copyright <span id="footer-year"></span> Cyber Signal</span>
            <span class="footer-right">Last Updated <span id="footer-updated">Pending initial run</span></span>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
