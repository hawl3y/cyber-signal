<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Signal</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
</head>
<body>
    <div class="page">
        <header class="header">
            <h1>Cyber Signal</h1>
            <p>Structured cyber event intelligence dashboard.</p>
        </header>

        <div class="grid">
            <aside class="panel">
                <div class="sidebar-section">
                    <h2>Filters</h2>

                    <div style="display:grid; gap:12px;">
                        <div>
                            <label for="filter-industry">Industry</label><br>
                            <select id="filter-industry" style="width:100%; margin-top:4px;">
                                <option value="">All</option>
                            </select>
                        </div>

                        <div>
                            <label for="filter-region">Region</label><br>
                            <select id="filter-region" style="width:100%; margin-top:4px;">
                                <option value="">All</option>
                            </select>
                        </div>

                        <div>
                            <label for="filter-country">Country</label><br>
                            <select id="filter-country" style="width:100%; margin-top:4px;">
                                <option value="">All</option>
                            </select>
                        </div>

                        <div>
                            <label for="filter-city">City</label><br>
                            <select id="filter-city" style="width:100%; margin-top:4px;">
                                <option value="">All</option>
                            </select>
                        </div>

                        <div>
                            <label for="filter-attack-type">Attack Type</label><br>
                            <select id="filter-attack-type" style="width:100%; margin-top:4px;">
                                <option value="">All</option>
                            </select>
                        </div>

                        <div>
                            <label for="filter-event-status">Event Status</label><br>
                            <select id="filter-event-status" style="width:100%; margin-top:4px;">
                                <option value="">All</option>
                            </select>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="content-stack">
                <section class="summary-grid">
                    <div class="summary-card">
                        <span class="label">Total Events</span>
                        <span class="value" id="total-events">--</span>
                    </div>
                    <div class="summary-card">
                        <span class="label">Top Industry</span>
                        <span class="value" id="top-industry">--</span>
                    </div>
                    <div class="summary-card">
                        <span class="label">Top Attack Type</span>
                        <span class="value" id="top-attack-type">--</span>
                    </div>
                    <div class="summary-card">
                        <span class="label">Known Vulnerability %</span>
                        <span class="value" id="known-vuln-percent">--</span>
                    </div>
                </section>

                <section class="panel feed-placeholder">
                    <h2>Event Feed</h2>
                    <div id="event-feed" class="feed-list"></div>
                </section>

                <section class="panel map-placeholder">
                    <h2>Map</h2>
                    <div id="map" style="height: 320px; border-radius: 12px;"></div>
                </section>
            </main>
        </div>
    </div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
