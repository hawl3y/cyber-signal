<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Signal</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="page">
        <header class="header">
            <h1>Cyber Signal</h1>
            <p>High-signal cyber incident brief.</p>
        </header>

        <main class="layout">
            <section class="panel filters-panel">
                <div class="panel-header-simple">
                    <h2>Filters</h2>
                    <button id="reset-filters" type="button" class="filter-reset-button">
                        Reset
                    </button>
                </div>

                <div class="filter-row">
                    <div class="filter-item">
                        <label for="filter-time-range">Time Range</label>
                        <select id="filter-time-range" class="filter-select">
                            <option value="24h">24h</option>
                            <option value="7d" selected>7d</option>
                            <option value="30d">30d</option>
                        </select>
                    </div>

                    <div class="filter-item">
                        <label for="filter-industry">Industry</label>
                        <select id="filter-industry" class="filter-select">
                            <option value="">All</option>
                        </select>
                    </div>

                    <div class="filter-item">
                        <label for="filter-region">Region</label>
                        <select id="filter-region" class="filter-select">
                            <option value="">All</option>
                        </select>
                    </div>

                    <div class="filter-item">
                        <label for="filter-attack-type">Attack Type</label>
                        <select id="filter-attack-type" class="filter-select">
                            <option value="">All</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="summary-strip">
                <div class="summary-card">
                    <span class="label">Total Incidents</span>
                    <span class="value" id="total-incidents">--</span>
                </div>
                <div class="summary-card">
                    <span class="label">Confirmed Incidents</span>
                    <span class="value" id="confirmed-incidents">--</span>
                </div>
                <div class="summary-card">
                    <span class="label">Emerging</span>
                    <span class="value" id="emerging-signals">--</span>
                </div>
                <div class="summary-card">
                    <span class="label">Top Attack Type</span>
                    <span class="value value-text" id="top-attack-type">--</span>
                </div>
                <div class="summary-card">
                    <span class="label">Top Targeted Industry</span>
                    <span class="value value-text" id="top-targeted-industry">--</span>
                </div>
            </section>

            <section class="panel feed-panel">
                <div class="feed-header">
                    <h2>High-Signal Events</h2>
                    <span id="feed-count" class="feed-count"></span>
                </div>
                <div id="event-feed" class="feed-list"></div>
            </section>

            <section class="panel trends-panel">
                <div class="panel-header-simple">
                    <h2>Trend Snapshot</h2>
                    <span class="panel-subtitle">Last 7 days</span>
                </div>

                <div class="trends-grid">
                    <div class="trend-block">
                        <h3>Top Attack Types</h3>
                        <div id="trend-attack-types" class="trend-list"></div>
                    </div>

                    <div class="trend-block">
                        <h3>Top Industries</h3>
                        <div id="trend-industries" class="trend-list"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
